# Redemption configuration for PrivX FIPS mode

[globals]

handshake_timeout = 15
base_inactivity_timeout = 3600
enable_wab_integration = 1

[file_verification]

enable_up = 1
enable_down = 1
clipboard_text_up = 1
clipboard_text_down = 1

[server_cert]

server_cert_store = 0
server_cert_check = 1

[client]

# The following configurations apply to connections from
# native RDP clients to rdp-mitm (rdp-mitm as server)

# Disable fallback to legacy RDP security explicitly. Default is also 0.
tls_fallback_legacy = 0
tls_support = 1

# FIPS: minimal TLS level is TLSv1.2
# min TLS level 0=TLSv1, 1=TLSv1.1, 2=TLSv1.2, 3=TLSv1.3
tls_min_level = 2
# max TLS level 0=no restriction, 1=TLSv1.1, 2=TLSv1.2, 3=TLSv1.3
tls_max_level = 0

# Cipher string up to TLSv1.2
# https://docs.openssl.org/3.0/man1/openssl-ciphers/
# Test cipher suites using: /opt/privx/openssl/bin/openssl -s -V -stdname 'cipher_string'
# TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
# TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
# TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
# TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
# TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA384
# TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA256
# TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA384
# TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256
# TLS_RSA_WITH_AES_256_GCM_SHA384
# TLS_RSA_WITH_AES_128_GCM_SHA256
# TLS_RSA_WITH_AES_256_CBC_SHA256
# TLS_RSA_WITH_AES_128_CBC_SHA256
ssl_cipher_list = !SHA1:ECDHE+ECDSA+AESGCM:ECDHE+aRSA+AESGCM:ECDHE+ECDSA+AES+CBC:ECDHE+aRSA+AES+CBC:kRSA+AESGCM:kRSA+AES+CBC

# TLSv1.3 cipher suites
# https://docs.openssl.org/3.0/man3/SSL_CTX_set_cipher_list/
# TLS_AES_256_GCM_SHA384
# TLS_AES_128_GCM_SHA256
tls_1_3_ciphersuites = TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256

# Debug: show common cipher list in logs (0 or 1)
show_common_cipher_list = 0

# NLA not supported nor compatible with FIPS
enable_nla = 0

[mod_rdp]

# The following configurations apply to connections
# from rdp-mitm to target RDP servers (rdp-mitm as client)

# Remoteapp engine
wabam_uses_translated_remoteapp = 1

# Debug: show common cipher list in logs (0 or 1)
show_common_cipher_list = 0

[internal_mod]

enable_target_field = 0

[theme]

enable_theme = 1
logo = /opt/privx/etc/rdpmitm/themes/privx/logo.png

bgcolor = 0x092336
fgcolor = WHITE
separator_color = 0x1878B1
focus_color = 0x0F4567
error_color = RED

edit_bgcolor = WHITE
edit_fgcolor = BLACK
edit_focus_color = 0x0F4567

tooltip_bgcolor = 0xF6ECE9
tooltip_fgcolor = DARKBLUE
tooltip_border_color = DARKGREEN

selector_line1_bgcolor = 0x0F4567
selector_line1_fgcolor = WHITE
selector_line2_bgcolor = 0x0B3956
selector_line2_fgcolor = WHITE
selector_selected_bgcolor = 0x258232
selector_selected_fgcolor = WHITE
selector_focus_bgcolor = 0x258232
selector_focus_fgcolor = WHITE
selector_label_bgcolor = 0x0F4567
selector_label_fgcolor = WHITE
